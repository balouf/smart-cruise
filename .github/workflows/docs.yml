# This workflow builds the Sphinx documentation on pushes to main and on
# pull requests (for validation), and deploys to GitHub Pages on main
# using the official actions/upload-pages-artifact + actions/deploy-pages
# flow (no gh-pages branch).
#
# NOTE: after this workflow is merged, the GitHub Pages "Source" setting
# for this repo must be switched from "Deploy from a branch" to
# "GitHub Actions" in Settings -> Pages.

name: docs

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Needed by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and the latest queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: '3.9'

      - name: Build Sphinx documentation
        run: |
          uv sync --all-extras
          uv run sphinx-build -a -E -b html docs build
          touch build/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
